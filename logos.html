document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

"<!DOCTYPE html>\n<html><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n\n<script src=\"44c631f6-e850-4af1-a09d-57d14d9ccaf0\"><\u002Fscript>\n<\u002Fhead>\n<body>\n<x-dc>\n<helmet>\n<style>/* Deepak Musale Design System — global entry point.\n   Consumers link THIS file. Keep it as @import lines only. */\n:root {\n  /* ── Brand core ── */\n  --dm-red:        #b00041;   /* primary brand magenta */\n  --dm-violet:     #2c0087;   /* primary brand deep violet */\n  --dm-purple:     #7000cc;   /* mid accent (orb) */\n  --dm-red-bright: #ff2060;   /* hover / active highlight */\n\n  /* ── Surfaces (dark navy) ── */\n  --dm-bg:      #0f173d;   /* primary section background */\n  --dm-bg-alt:  #091034;   /* alternating darker section background */\n\n  /* ── Text ── */\n  --dm-white:  #ffffff;\n  --dm-light:  rgba(255,255,255,0.85);  /* body copy */\n  --dm-muted:  rgba(255,255,255,0.45);  /* secondary / captions */\n\n  /* ── Cards & borders (on dark) ── */\n  --dm-card-bg:      rgba(255,255,255,0.04);\n  --dm-card-border:  rgba(255,255,255,0.08);\n\n  /* ── Brand gradient ── */\n  --dm-grad: linear-gradient(135deg, var(--dm-red), var(--dm-violet));\n\n  /* ── Tinted red utility fills (icon chips, hover washes) ── */\n  --dm-red-wash-08:  rgba(176,0,65,0.08);\n  --dm-red-wash-12:  rgba(176,0,65,0.12);\n  --dm-red-wash-15:  rgba(176,0,65,0.15);\n  --dm-red-line-20:  rgba(176,0,65,0.20);\n  --dm-red-line-25:  rgba(176,0,65,0.25);\n  --dm-red-line-45:  rgba(176,0,65,0.45);\n  --dm-red-line-50:  rgba(176,0,65,0.50);\n\n  /* ── Semantic aliases ── */\n  --dm-text-strong:  var(--dm-white);\n  --dm-text-body:    var(--dm-light);\n  --dm-text-subtle:  var(--dm-muted);\n  --dm-surface:      var(--dm-bg);\n  --dm-surface-alt:  var(--dm-bg-alt);\n  --dm-surface-card: var(--dm-card-bg);\n  --dm-border:       var(--dm-card-border);\n  --dm-accent:       var(--dm-red);\n}\n\n:root {\n  /* ── Font family ──\n     The site uses the native system UI stack (Segoe UI first).\n     Keep it system-native — no webfont is loaded. */\n  --dm-font-sans: 'Segoe UI', system-ui, -apple-system, 'Helvetica Neue', Arial, sans-serif;\n\n  /* ── Weights ── */\n  --dm-weight-regular:  400;\n  --dm-weight-medium:   500;\n  --dm-weight-semibold: 600;\n  --dm-weight-bold:     700;\n  --dm-weight-black:    800;   /* display headings */\n\n  /* ── Type scale (fluid where the site is fluid) ── */\n  --dm-fs-hero:    clamp(2.8rem, 6vw, 5.5rem);      /* hero title */\n  --dm-fs-title:   clamp(1.8rem, 3.5vw, 2.8rem);    /* section title */\n  --dm-fs-h3:      1.1rem;                          /* card name */\n  --dm-fs-lead:    1.15rem;                         /* hero subtitle */\n  --dm-fs-body:    1rem;\n  --dm-fs-small:   0.9rem;\n  --dm-fs-caption: 0.83rem;\n  --dm-fs-label:   0.78rem;     /* eyebrow / section labels */\n  --dm-fs-micro:   0.75rem;\n\n  /* ── Letter-spacing ── */\n  --dm-ls-tight:  -0.02em;   /* display headings */\n  --dm-ls-snug:   -0.01em;\n  --dm-ls-wide:    0.04em;\n  --dm-ls-wider:   0.10em;\n  --dm-ls-label:   0.14em;   /* uppercase eyebrows */\n\n  /* ── Line-height ── */\n  --dm-lh-tight:  1.05;\n  --dm-lh-snug:   1.15;\n  --dm-lh-body:   1.8;\n}\n\n:root {\n  /* ── Spacing scale ── */\n  --dm-space-1:  6px;\n  --dm-space-2:  8px;\n  --dm-space-3:  12px;\n  --dm-space-4:  16px;\n  --dm-space-5:  20px;\n  --dm-space-6:  24px;\n  --dm-space-8:  32px;\n  --dm-space-10: 40px;\n  --dm-space-12: 48px;\n  --dm-space-15: 60px;\n  --dm-space-20: 80px;\n\n  /* ── Section rhythm ── */\n  --dm-section-pad-y: 100px;   /* vertical section padding */\n  --dm-section-pad-x: 5vw;     /* horizontal gutter */\n  --dm-content-max:   1200px;  /* hero / prose max width */\n  --dm-page-max:      1400px;  /* full section max width */\n  --dm-nav-height:    72px;\n\n  /* ── Corner radii ── */\n  --dm-radius-sm:   8px;    /* logo tile */\n  --dm-radius-md:   14px;   /* icon chips */\n  --dm-radius-lg:   16px;   /* stat cards */\n  --dm-radius-xl:   20px;   /* feature / contact cards */\n  --dm-radius-pill: 100px;  /* buttons, tags, social links */\n}\n\n:root {\n  /* ── Shadows (brand-tinted glows, not neutral drops) ── */\n  --dm-shadow-btn:        0 4px 30px rgba(176,0,65,0.40);   /* primary button rest */\n  --dm-shadow-btn-hover:  0 8px 40px rgba(176,0,65,0.55);   /* primary button hover */\n  --dm-shadow-card-hover: 0 20px 60px rgba(176,0,65,0.15);  /* feature card lift */\n  --dm-glow-logo:         drop-shadow(0 0 60px rgba(176,0,65,0.25));\n\n  /* ── Blur ── */\n  --dm-blur-nav:  20px;    /* glassmorphic navbar backdrop */\n  --dm-blur-orb:  120px;   /* hero ambient orbs */\n\n  /* ── Motion ── */\n  --dm-ease-out:    cubic-bezier(0.22, 0.68, 0, 1.2);  /* springy card/icon */\n  --dm-dur-fast:    0.25s;\n  --dm-dur-base:    0.30s;\n  --dm-dur-slow:    0.70s;\n\n  /* ── Lift transforms (hover) ── */\n  --dm-lift-sm: translateY(-3px);\n  --dm-lift-md: translateY(-4px);\n  --dm-lift-lg: translateY(-8px);\n}\n\n<\u002Fstyle>\n<style>\n  *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }\n  body { font-family:var(--dm-font-sans); background:var(--dm-bg); color:var(--dm-white); overflow-x:hidden; }\n  a { text-decoration:none; }\n  @keyframes dmFadeUp { from { opacity:0; transform:translateY(24px); } to { opacity:1; transform:translateY(0); } }\n  @keyframes dmDrop { from { opacity:0; transform:translateY(-8px); } to { opacity:1; transform:translateY(0); } }\n  .dm-tile { border:1px solid var(--dm-card-border); transition:border-color .35s, box-shadow .35s; }\n  .dm-tile:hover { border-color:var(--dm-red); }\n  .dm-tile .dm-tile-wash { opacity:0; transition:opacity .4s ease; }\n  .dm-tile:hover .dm-tile-wash { opacity:1; }\n<\u002Fstyle>\n<\u002Fhelmet>\n\n<nav style=\"position:sticky; top:0; z-index:100; display:flex; align-items:center; justify-content:space-between; padding:0 5vw; height:var(--dm-nav-height); background:rgba(15,23,61,0.85); backdrop- ; color:#fff; text-shadow:0 2px 12px rgba(0,0,0,.5);\">{{ logo.name }}<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-for>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<sc-if value=\"{{ hasActive }}\" hint-placeholder-val=\"{{ false }}\">\n  <div onclick=\"{{ closeLightbox }}\" style=\"position:fixed; inset:0; z-index:1000; display:flex; align-items:center; justify-content:center; padding:5vh 5vw; background:rgba(6,11,36,0.86); backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px); animation:dmFadeUp .25s ease;\">\n    <button onclick=\"{{ prev }}\" aria-label=\"Previous\" style=\"position:absolute; left:3vw; top:50%; transform:translateY(-50%); width:54px; height:54px; display:flex; align-items:center; justify-content:center; border:1px solid var(--dm-card-border); border-radius:50%; background:rgba(15,23,61,0.9); color:#fff; font-size:1.7rem; line-height:1; padding-bottom:4px; cursor:pointer; z-index:3; transition:border-color .3s, transform .3s;\" style-hover=\"border-color:var(--dm-red-line-50); transform:translateY(-50%) scale(1.09)\">‹<\u002Fbutton>\n    <button onclick=\"{{ next }}\" aria-label=\"Next\" style=\"position:absolute; right:3vw; top:50%; transform:translateY(-50%); width:54px; height:54px; display:flex; align-items:center; justify-content:center; border:1px solid var(--dm-card-border); border-radius:50%; background:rgba(15,23,61,0.9); color:#fff; font-size:1.7rem; line-height:1; padding-bottom:4px; cursor:pointer; z-index:3; transition:border-color .3s, transform .3s;\" style-hover=\"border-color:var(--dm-red-line-50); transform:translateY(-50%) scale(1.09)\">›<\u002Fbutton>\n    <div onclick=\"{{ stop }}\" style=\"position:relative; max-width:920px; width:100%; display:flex; flex-direction:column; align-items:center; gap:18px;\">\n      <button onclick=\"{{ closeLightbox }}\" aria-label=\"Close\" style=\"position:absolute; top:-14px; right:-6px; width:44px; height:44px; display:flex; align-items:center; justify-content:center; border:1px solid var(--dm-card-border); border-radius:50%; background:rgba(15,23,61,0.9); color:#fff; font-size:1.3rem; line-height:1; cursor:pointer; transition:border-color .3s, transform .3s;\" style-hover=\"border-color:var(--dm-red-line-50); transform:scale(1.08)\">×<\u002Fbutton>\n      <img data-src=\"{{ activeSrc }}\" alt=\"{{ activeName }}\" style=\"max-width:100%; max-height:74vh; object-fit:contain; border-radius:var(--dm-radius-xl); border:1px solid var(--dm-card-border); box-shadow:0 30px 80px rgba(0,0,0,.55);\">\n      <div style=\"text-align:center;\">\n        <div style=\"font-size:.72rem; letter-spacing:.12em; text-transform:uppercase; font-weight:700; margin-bottom:6px; background:var(--dm-grad); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;\">{{ activeType }}<\u002Fdiv>\n        <div style=\"font-size:1.25rem; font-weight:700; letter-spacing:-.01em; color:#fff;\">{{ activeName }}<\u002Fdiv>\n        <div style=\"font-size:.75rem; color:var(--dm-muted); margin-top:10px; letter-spacing:.14em;\">{{ counter }}<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsc-if>\n\n<footer style=\"border-top:1px solid var(--dm-card-border); padding:36px 5vw; text-align:center; color:var(--dm-muted); font-size:.82rem; letter-spacing:.04em; background:var(--dm-bg-alt);\">\n  <p>© 2025 <span style=\"font-weight:700; background:var(--dm-grad); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;\">Deepak Musale<\u002Fspan>. All rights reserved. Designed with passion.<\u002Fp>\n<\u002Ffooter>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = { activeIdx: null, menuOpen: false };\n  componentDidMount() {\n    this._onKey = (e) => {\n      if (this.state.activeIdx == null) return;\n      if (e.key === \"ArrowRight\") this._step(1);\n      else if (e.key === \"ArrowLeft\") this._step(-1);\n      else if (e.key === \"Escape\") this.setState({ activeIdx: null });\n    };\n    window.addEventListener(\"keydown\", this._onKey);\n    this._syncImgs();\n    this._initCursor();\n    this._initTilt();\n  }\n  _initTilt() {\n    if (this._tiltInit) return;\n    if (!window.matchMedia || !window.matchMedia(\"(pointer: fine)\").matches) return;\n    this._tiltInit = true;\n    const MAX = 10;\n    let current = null;\n    const reset = (card) => {\n      card.style.transition = \"transform .6s cubic-bezier(.22,1,.36,1), border-color .35s, box-shadow .35s\";\n      card.style.transform = \"perspective(800px) rotateX(0deg) rotateY(0deg)\";\n    };\n    this._onTiltMove = (e) => {\n      const card = e.target.closest(\"[data-idx]\");\n      if (card !== current) {\n        if (current) reset(current);\n        current = card;\n      }\n      if (!card) return;\n      const r = card.getBoundingClientRect();\n      const px = (e.clientX - r.left) / r.width - 0.5;\n      const py = (e.clientY - r.top) / r.height - 0.5;\n      const ry = px * 2 * MAX;\n      const rx = -py * 2 * MAX;\n      card.style.transition = \"transform .08s ease-out, border-color .35s, box-shadow .35s\";\n      card.style.transform = `perspective(800px) rotateX(${rx}deg) rotateY(${ry}deg)`;\n    };\n    window.addEventListener(\"mousemove\", this._onTiltMove);\n  }\n  _initCursor() {\n    if (window.__dmCursorInit) return;\n    if (!window.matchMedia || !window.matchMedia(\"(pointer: fine)\").matches) return;\n    window.__dmCursorInit = true;\n\n    const css = document.createElement(\"style\");\n    css.textContent = `\n      * { cursor: none !important; }\n      .cursor-dot, .cursor-ring {\n        position: fixed; top: 0; left: 0;\n        pointer-events: none; z-index: 9999;\n        transform: translate(-50%, -50%); will-change: transform;\n      }\n      .cursor-dot {\n        width: 8px; height: 8px; border-radius: 50%;\n        background: linear-gradient(135deg, #b00041, #2c0087);\n        box-shadow: 0 0 12px rgba(176,0,65,0.8);\n      }\n      .cursor-ring {\n        width: 38px; height: 38px; border-radius: 50%;\n        border: 1.5px solid rgba(255,255,255,0.45);\n        transition: width .25s ease, height .25s ease, border-color .25s ease, background .25s ease;\n      }\n      .cursor-ring.hover {\n        width: 64px; height: 64px;\n        border-color: rgba(176,0,65,0.9);\n        background: radial-gradient(circle, rgba(176,0,65,0.12), transparent 70%);\n      }\n      .cursor-ring.click { width: 28px; height: 28px; }\n    `;\n    document.head.appendChild(css);\n\n    const dot = document.createElement(\"div\");\n    dot.className = \"cursor-dot\";\n    const ring = document.createElement(\"div\");\n    ring.className = \"cursor-ring\";\n    document.body.appendChild(dot);\n    document.body.appendChild(ring);\n\n    let mx = window.innerWidth / 2, my = window.innerHeight / 2;\n    let rx = mx, ry = my;\n\n    window.addEventListener(\"mousemove\", (e) => {\n      mx = e.clientX; my = e.clientY;\n      dot.style.transform = `translate(${mx}px, ${my}px) translate(-50%, -50%)`;\n    });\n    (function animate() {\n      rx += (mx - rx) * 0.18;\n      ry += (my - ry) * 0.18;\n      ring.style.transform = `translate(${rx}px, ${ry}px) translate(-50%, -50%)`;\n      requestAnimationFrame(animate);\n    })();\n\n    const hoverSel = \"a, button, [data-idx], [onclick]\";\n    document.addEventListener(\"mouseover\", (e) => {\n      if (e.target.closest(hoverSel)) ring.classList.add(\"hover\");\n    });\n    document.addEventListener(\"mouseout\", (e) => {\n      if (e.target.closest(hoverSel)) ring.classList.remove(\"hover\");\n    });\n    document.addEventListener(\"mousedown\", () => ring.classList.add(\"click\"));\n    document.addEventListener(\"mouseup\", () => ring.classList.remove(\"click\"));\n  }\n  componentDidUpdate() { this._syncImgs(); }\n  _syncImgs() {\n    document.querySelectorAll(\"img[data-src]\").forEach((img) => {\n      const s = img.getAttribute(\"data-src\");\n      if (s && s.indexOf(\"{{\") === -1 && img.getAttribute(\"src\") !== s) img.setAttribute(\"src\", s);\n    });\n  }\n  componentWillUnmount() {\n    window.removeEventListener(\"keydown\", this._onKey);\n    if (this._onTiltMove) window.removeEventListener(\"mousemove\", this._onTiltMove);\n  }\n  _step(d) {\n    const n = this._logos.length;\n    this.setState(s => ({ activeIdx: (s.activeIdx + d + n) % n }));\n  }\n  renderVals() {\n    const raw = [\n      { src: \"images/01-mumbai-warriors.jpg\", name: \"Mumbai Warriors\", type: \"Sports Branding\" },\n      { src: \"images/02-mumbai-panthers.jpg\", name: \"Mumbai Panthers\", type: \"Sports Branding\" },\n      { src: \"images/03-jaiswal-premier-league.jpeg\", name: \"Jaiswal Premier League\", type: \"Sports League\" },\n      { src: \"images/04-horizon-sports.jpg\", name: \"Horizon Sports\", type: \"Sports Media\" },\n      { src: \"images/05-signify.jpeg\", name: \"Signify\", type: \"Esports & Gaming\" },\n      { src: \"images/06-shrem-resort.jpeg\", name: \"Shrem Resort\", type: \"Hospitality\" },\n      { src: \"images/07-the-lands-flavour-resorts.jpg\", name: \"The Land's Flavour Resorts\", type: \"Hospitality\" },\n      { src: \"images/08-sanraj-hotels.jpeg\", name: \"SanRaj Hotels\", type: \"Hospitality\" },\n      { src: \"images/09-ayurisai.jpg\", name: \"AyuriSai\", type: \"Wellness & Ayurveda\" },\n      { src: \"images/10-call2connect.jpg\", name: \"Call2Connect\", type: \"Corporate\" },\n      { src: \"images/11-grait.jpg\", name: \"Grait\", type: \"Technology\" },\n      { src: \"images/12-quanta-advisory.png\", name: \"Quanta Advisory\", type: \"Consulting\" },\n      { src: \"images/13-the-curious-executive.png\", name: \"The Curious Executive\", type: \"Podcast\" },\n      { src: \"images/14-kd-studios.jpg\", name: \"KD Studios\", type: \"Creative Studio\" },\n    ];\n    const logos = raw.map(l => ({ ...l, src: encodeURI(l.src) }));\n    this._logos = logos;\n    const idx = this.state.activeIdx;\n    const active = idx != null ? logos[idx] : null;\n    const pad2 = (x) => String(x).padStart(2, \"0\");\n    return {\n      menuOpen: this.state.menuOpen,\n      toggleMenu: (e) => { e.stopPropagation(); this.setState(s => ({ menuOpen: !s.menuOpen })); },\n      closeMenu: () => this.setState({ menuOpen: false }),\n      logos,\n      hasActive: active != null,\n      activeSrc: active ? active.src : \"\",\n      activeName: active ? active.name : \"\",\n      activeType: active ? active.type : \"\",\n      counter: active ? pad2(idx + 1) + \" / \" + pad2(logos.length) : \"\",\n      onTileClick: (e) => {\n        const i = +e.currentTarget.getAttribute(\"data-idx\");\n        this.setState({ activeIdx: i });\n      },\n      prev: (e) => { e.stopPropagation(); this._step(-1); },\n      next: (e) => { e.stopPropagation(); this._step(1); },\n      closeLightbox: () => this.setState({ activeIdx: null }),\n      stop: (e) => e.stopPropagation(),\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
