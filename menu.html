<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Menu Bar — Deepak Musale</title>
<template id="__bundler_thumbnail" data-bg-color="#0f173d">
  <svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
    <rect width="1200" height="800" fill="#0f173d"/>
    <rect x="0" y="330" width="1200" height="140" fill="#091034"/>
    <text x="600" y="425" font-family="Segoe UI, system-ui, sans-serif" font-size="64" font-weight="700" text-anchor="middle" fill="#fff" letter-spacing="4">MENU</text>
  </svg>
</template>
<style>
  /* ============================================================
     SHARED MENU BAR — Deepak Musale portfolio
     Colors:  navy #0f173d / #091034  •  gradient #b00041 → #2c0087
     Font:    Segoe UI / system stack
     Contains: styles + menu text + Portfolio dropdown buttons + JS
     ============================================================ */

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #091034;
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    /* padding so the fixed bar is visible when this file is opened directly */
    padding-top: 140px;
    min-height: 100vh;
  }

  /* ── NAVBAR ── */
  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 5vw;
    height: 72px;
    background: rgba(15, 23, 61, 0.85);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-bottom: 1px solid rgba(255, 255, 255, 0.08);
  }

  .nav-logo {
    display: flex; align-items: center; gap: 12px; text-decoration: none;
  }
  .nav-logo img {
    height: 40px; width: 40px; object-fit: contain;
    border-radius: 8px; filter: brightness(0) invert(1);
  }
  .nav-name {
    font-size: 1.1rem; font-weight: 600; letter-spacing: 0.06em; color: #fff;
  }

  .nav-links {
    display: flex; align-items: center; gap: 32px;
    list-style: none;
  }
  .nav-links a {
    color: rgba(255, 255, 255, 0.85); text-decoration: none;
    font-size: 0.88rem; letter-spacing: 0.04em; text-transform: uppercase;
    transition: color 0.3s;
  }
  .nav-links a:hover { color: #fff; }

  /* ── Portfolio dropdown ── */
  .dropdown { position: relative; }
  .dropdown-toggle {
    display: flex; align-items: center; gap: 6px; cursor: pointer;
    color: rgba(255, 255, 255, 0.85);
    font-size: 0.88rem; letter-spacing: 0.04em; text-transform: uppercase;
    background: none; border: none; padding: 0;
    font-family: inherit; transition: color 0.3s;
  }
  .dropdown-toggle:hover { color: #fff; }
  .dropdown-toggle .chevron {
    width: 10px; height: 6px; transition: transform 0.3s;
  }
  .dropdown.open .chevron { transform: rotate(180deg); }

  .dropdown-menu {
    position: absolute; top: calc(100% + 16px); right: 0;
    background: rgba(15, 23, 61, 0.98);
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 12px; padding: 8px 0; min-width: 210px;
    opacity: 0; pointer-events: none; transform: translateY(-8px);
    transition: opacity 0.25s, transform 0.25s;
    backdrop-filter: blur(16px);
    box-shadow: 0 20px 40px rgba(0, 0, 0, 0.35);
  }
  .dropdown.open .dropdown-menu {
    opacity: 1; pointer-events: all; transform: translateY(0);
  }
  .dropdown-menu a {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 20px;
    color: rgba(255, 255, 255, 0.85); text-decoration: none;
    font-size: 0.85rem; letter-spacing: 0.02em; text-transform: none;
    transition: background 0.2s, color 0.2s;
  }
  .dropdown-menu a svg { width: 16px; height: 16px; opacity: 0.6; }
  .dropdown-menu a:hover { background: rgba(176, 0, 65, 0.15); color: #fff; }

  @media (max-width: 900px) {
    .nav-links { display: none; }
  }
</style>
</head>
<body>

<!-- ══════════════════ MENU BAR ══════════════════ -->
<nav>
  <a href="index.html#hero" class="nav-logo">
    <img src="assets/222_.png" alt="Deepak Musale logo" />
    <span class="nav-name">Deepak Musale</span>
  </a>

  <ul class="nav-links">
    <li><a href="index.html#about">About</a></li>

    <li class="dropdown" id="portfolioDropdown">
      <button class="dropdown-toggle" onclick="document.getElementById('portfolioDropdown').classList.toggle('open')">
        Portfolio
        <svg class="chevron" viewBox="0 0 10 6" fill="none">
          <path d="M1 1l4 4 4-4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
        </svg>
      </button>
      <div class="dropdown-menu">
        <a href="index.html#portfolio"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M12 2v2m0 16v2M4.93 4.93l1.41 1.41m11.32 11.32 1.41 1.41M2 12h2m16 0h2M4.93 19.07l1.41-1.41m11.32-11.32 1.41-1.41"/></svg> Logos</a>
        <a href="index.html#portfolio"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg> Branding</a>
        <a href="index.html#portfolio"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg> Events</a>
        <a href="index.html#portfolio"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8m-4-4v4"/></svg> Website</a>
        <a href="index.html#portfolio"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="2" width="14" height="20" rx="2"/><path d="M12 18h.01"/></svg> Social Media Posts</a>
        <a href="index.html#portfolio"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg> Brochures</a>
        <a href="index.html#portfolio"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 003 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z"/></svg> Packaging</a>
        <a href="index.html#portfolio"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2"/></svg> Videos</a>
        <a href="index.html#portfolio"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9M16.5 3.5a2.121 2.121 0 013 3L7.5 20.5 2 22l1.5-5.5L16.5 3.5z"/></svg> Paintings</a>
        <a href="index.html#portfolio"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M17 3a2.828 2.828 0 114 4L7.5 20.5 2 22l1.5-5.5L17 3z"/></svg> Sketching</a>
      </div>
    </li>

    <li><a href="index.html#social">Connect</a></li>
    <li><a href="index.html#contact">Contact</a></li>
  </ul>
</nav>

<script>
  // Close the Portfolio dropdown when clicking anywhere outside it.
  document.addEventListener('click', function (e) {
    var d = document.getElementById('portfolioDropdown');
    if (d && !e.target.closest('#portfolioDropdown')) d.classList.remove('open');
  });
</script>

</body>
</html>
